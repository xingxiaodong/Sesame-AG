name: 功能建议 / Feature request
description: 提出新的能力、优化项、工程改进或文档改进建议
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你愿意提出建议。

        如果你要发的是一般讨论、使用交流、提问，或只是还不够明确的想法，请优先前往 [Discussions](https://github.com/aoguai/Sesame-AG/discussions)。

        提交前请先阅读：
        - [README](https://github.com/aoguai/Sesame-AG/blob/dev/README.md)
        - [LEGAL](https://github.com/aoguai/Sesame-AG/blob/dev/LEGAL.md)
        - [CONTRIBUTING](https://github.com/aoguai/Sesame-AG/blob/dev/CONTRIBUTING.md)

        当前仓库优先接受与学习研究、代码维护、调试辅助和公开协作一致的建议。不符合项目边界诉求的请求，通常不会被受理。

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      options:
        - label: 我已经确认这不是与当前项目定位冲突的边界需求
          required: true
        - label: 我已经搜索过现有 Issues / Pull Requests，没有找到相同或高度相似的建议
          required: true
        - label: 我已经确认这不是一般讨论 / 提问 / 使用交流；这类内容应发到 Discussions
          required: true
        - label: 我已经阅读 README / LEGAL / CONTRIBUTING，并理解当前仓库的协作边界
          required: true
        - label: 我理解信息过于模糊、缺少使用场景或不可公开讨论的建议可能会被直接关闭
          required: true

  - type: dropdown
    id: enhancement_type
    attributes:
      label: 增强类型
      options:
        - 功能型增强
        - 优化型增强
        - 工程 / 工具链改进
        - 文档改进
        - 强迫症增强
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: 主要影响范围
      options:
        - 任务逻辑
        - Hook / RPC
        - UI / 设置页
        - 调试工具 / 日志
        - 构建 / 发布 / 元数据
        - 文档 / 协作流程
        - 其他
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 建议摘要
      description: 用一句话概括你希望增加或改进什么
      placeholder: 为调试日志增加按任务模块筛选的导出能力。
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 说明当前痛点、为什么现状不够用、使用场景是什么
      placeholder: |
        当前导出的日志粒度过大，排查单个任务问题时需要手工筛选，成本较高。
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 期望的解决方案
      description: 尽量具体地描述你想看到的行为、界面、配置项或接口
      placeholder: |
        在日志页增加“按任务模块导出”选项，支持选择 antForest / antFarm 等模块并导出对应日志。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 如果已有临时做法或其他思路，请一起写明
      placeholder: |
        当前只能先导出全部日志，再在本地手工过滤；可行但效率较低。

  - type: textarea
    id: impact
    attributes:
      label: 影响与价值
      description: 说明谁会受影响、频率如何、为什么值得做
      placeholder: |
        - 受影响对象：排查任务异常的维护者和贡献者
        - 频率：中高频
        - 价值：缩短定位问题的时间，提高反馈质量
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证据、示例或参考
      description: 可以附类似实现、截图、日志片段、原型或其他参考信息
      placeholder: |
        可附上现有界面截图、日志示例、上游参考实现或你自己的原型描述。

  - type: textarea
    id: additional_information
    attributes:
      label: 补充信息
      description: 这里可以写兼容性要求、范围边界或你不希望影响的现有行为
      placeholder: |
        希望保持当前默认行为不变，仅在导出时新增筛选能力。
