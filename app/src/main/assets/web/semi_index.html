<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesame Config - Semi Design</title>
    <!-- 引入 Semi Design CSS -->
    <link rel="stylesheet" href="./css/semi.min.css" />
    <style>
        html {
            font-size: 100%;
        }

        body {
            background-color: var(--semi-color-bg-0);
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .container {
            max-width: 37.5rem;
            margin: 0 auto;
            background: var(--semi-color-bg-1);
            min-height: 100vh;
            box-shadow: 0 0 1.25rem rgba(0, 0, 0, 0.05);
            padding-bottom: 2.5rem;
        }

        .header {
            padding: 1rem;
            background: var(--semi-color-bg-2);
            border-bottom: 0.0625rem solid var(--semi-color-border);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(0.625rem);
            background-color: rgba(255, 255, 255, 0.8);
        }

        body[theme-mode='dark'] .header {
            background-color: rgba(22, 22, 26, 0.8);
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0.75rem 0;
            border-bottom: 0.0625rem solid var(--semi-color-border);
            gap: 0.75rem;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-choice-row {
            padding: 0.75rem 0;
            border-bottom: 0.0625rem solid var(--semi-color-border);
        }

        .field-row-inactive {
            background: var(--semi-color-fill-0);
            border-radius: 0.75rem;
            margin: 0 -0.5rem;
            padding: 0.75rem;
        }

        .field-choice-row.field-row-inactive {
            padding: 0.75rem;
        }

        .field-row-inactive .field-label {
            opacity: 0.82;
        }

        .field-row-inactive .field-control {
            opacity: 1;
            filter: none;
        }

        .field-label {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-right: 0.75rem;
        }

        .field-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--semi-color-text-0);
        }

        .field-desc {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
            white-space: normal;
        }

        .field-status {
            margin-top: 0.375rem;
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-warning);
            white-space: normal;
        }

        .field-control {
            flex-shrink: 0;
            max-width: 60%;
            padding-top: 0.125rem;
        }

        .section-padding {
            padding: 0 1rem;
        }

        /* 列表弹窗样式 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 0.0625rem solid var(--semi-color-border);
        }

        .list-item-left {
            display: flex;
            align-items: center;
            flex: 1;
            overflow: hidden;
        }

        .list-item-name {
            margin-left: 0.625rem;
            font-size: 0.9375rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--semi-color-text-0);
        }

        .list-count-input {
            width: 5rem;
            margin-left: 0.625rem;
        }

        .sheet-footer {
            display: flex;
            justify-content: flex-end;
            padding-top: 1rem;
            border-top: 0.0625rem solid var(--semi-color-border);
        }

        .friend-sheet {
            padding-bottom: 5rem;
        }

        .friend-sheet-floating-buttons {
            position: absolute;
            right: 1rem;
            bottom: 6rem;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            z-index: 101;
        }

        .friend-sheet-floating-button {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.15);
            background-color: var(--semi-color-bg-1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 0.0625rem solid var(--semi-color-border);
            color: var(--semi-color-text-0);
            transition: all 0.2s;
        }

        .friend-sheet-floating-button:active {
            transform: scale(0.9);
            background-color: var(--semi-color-fill-0);
        }

        .friend-summary-panel,
        .friend-toolbar,
        .friend-list-panel,
        .friend-advanced-panel {
            padding: 0.75rem 1rem;
            border-bottom: 0.0625rem solid var(--semi-color-border);
        }

        .friend-summary-note {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
        }

        .friend-section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.625rem 0;
            cursor: pointer;
        }

        .friend-list-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 0.0625rem solid var(--semi-color-border);
        }

        .friend-list-main {
            flex: 1;
            min-width: 0;
        }

        .friend-list-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--semi-color-text-0);
            overflow-wrap: anywhere;
        }

        .friend-list-meta {
            margin-top: 0.1875rem;
            font-size: 0.75rem;
            line-height: 1.45;
            color: var(--semi-color-text-2);
            overflow-wrap: anywhere;
        }

        .friend-state-effective,
        .friend-state-inactive {
            margin-top: 0.3125rem;
            font-size: 0.75rem;
            line-height: 1.45;
            font-weight: 600;
            overflow-wrap: anywhere;
        }

        .friend-state-effective {
            color: var(--semi-color-success);
        }

        .friend-state-inactive {
            color: var(--semi-color-danger);
        }

        .friend-list-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            max-width: 13rem;
        }

        .friend-list-item,
        .friend-list-main,
        .friend-list-main *,
        .friend-list-actions .semi-radio,
        .friend-list-actions .semi-radio *,
        .friend-section-title,
        .friend-section-title * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        @media (max-width: 30rem) {
            .friend-list-item {
                flex-direction: column;
            }

            .friend-list-actions {
                align-items: flex-start;
                max-width: 100%;
                width: 100%;
            }
        }

        .time-field-row {
            flex-direction: column;
            align-items: stretch;
        }

        .time-field-row .field-label {
            padding-right: 0;
        }

        .field-control-time {
            width: 100%;
            max-width: none;
            min-width: 0;
            padding-top: 0;
        }

        .time-editor {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            min-width: 0;
            padding: 0.75rem;
            box-sizing: border-box;
            border: 0.0625rem solid var(--semi-color-border);
            border-radius: 1rem;
            background: var(--semi-color-fill-0);
        }

        .time-editor-disabled {
            opacity: 0.76;
        }

        .time-editor-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 0.0625rem solid var(--semi-color-border);
        }

        .time-editor-status {
            flex: 1;
            min-width: 0;
        }

        .time-editor-state {
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--semi-color-text-0);
        }

        .time-editor-note {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
        }

        .time-editor-body {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-width: 0;
        }

        .time-list {
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            min-width: 0;
        }

        .time-empty {
            padding: 0.875rem 0.75rem;
            border: 0.0625rem dashed var(--semi-color-border);
            border-radius: 0.875rem;
            background: var(--semi-color-bg-0);
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
            text-align: center;
        }

        .time-item {
            padding: 0.75rem;
            border: 0.0625rem solid var(--semi-color-border);
            border-radius: 0.875rem;
            background: var(--semi-color-bg-0);
            box-sizing: border-box;
        }

        .time-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.625rem;
        }

        .time-item-title {
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--semi-color-text-1);
        }

        .time-input-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.625rem;
        }

        .time-input-block {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            min-width: 0;
        }

        .time-input-label {
            font-size: 0.75rem;
            line-height: 1.4;
            color: var(--semi-color-text-2);
        }

        .time-input,
        .time-hour-select {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            border: 0.0625rem solid var(--semi-color-border);
            border-radius: 0.75rem;
            padding: 0.625rem 0.75rem;
            background: var(--semi-color-bg-0);
            color: var(--semi-color-text-0);
            font-size: 0.875rem;
        }

        .time-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .time-action-button {
            min-width: 5.25rem;
        }

        .time-add-button {
            width: 100%;
        }

        .time-section {
            padding: 0.75rem;
            border: 0.0625rem solid var(--semi-color-border);
            border-radius: 1rem;
            background: var(--semi-color-fill-0);
        }

        .time-section-title {
            font-size: 0.8125rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--semi-color-text-0);
        }

        .time-section-desc {
            margin-top: 0.25rem;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
        }

        .time-helper {
            padding: 0.625rem 0.75rem;
            border-radius: 0.75rem;
            background: var(--semi-color-fill-0);
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--semi-color-text-2);
        }

        .time-helper-danger {
            color: var(--semi-color-danger);
            border: 0.0625rem solid rgba(244, 63, 94, 0.18);
        }

        @media (max-width: 30rem) {
            .time-editor-header {
                flex-direction: column;
            }

            .time-input-grid {
                grid-template-columns: 1fr;
            }

            .time-actions {
                justify-content: flex-start;
            }

            .time-action-button {
                flex: 1 1 calc(50% - 0.25rem);
                min-width: 0;
            }
        }

        .floating-buttons {
            position: fixed;
            right: 1rem;
            bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
        }

        .floating-button {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 50%;
            box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.15);
            background-color: var(--semi-color-bg-1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 0.0625rem solid var(--semi-color-border);
            color: var(--semi-color-text-0);
            transition: all 0.2s;
        }

        .floating-button:active {
            transform: scale(0.9);
            background-color: var(--semi-color-fill-0);
        }

        .time-editor-toggle {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--semi-color-primary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            transition: background-color 0.2s;
        }

        .time-editor-toggle:active {
            background-color: var(--semi-color-fill-0);
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="./js/react.development.js"></script>
    <script src="./js/react-dom.development.js"></script>
    <!-- Semi UI JS -->
    <script src="./js/semi-ui.min.js"></script>
    <!-- Semi Icons -->
    <script src="./js/semi-icons.min.js"></script>
    <!-- Babel -->
    <script src="./js/babel.min.js"></script>
</head>

<body>
    <div id="app"></div>

    <script type="text/babel">
        const switchMode = () => {
            const body = document.body;
            if (body.hasAttribute('theme-mode')) {
                body.removeAttribute('theme-mode');
                window.setMode('light');
            } else {
                body.setAttribute('theme-mode', 'dark');
                window.setMode('dark');
            }
        };
        const { useState, useEffect, useRef } = React;
        const { Collapse, Switch, Input, RadioGroup, Radio, Button, Toast, SideSheet, Checkbox, InputNumber, Typography } = SemiUI;
        const { IconSearch, IconChevronDown, IconChevronUp, IconArrowUp, IconArrowDown } = SemiIcons;
        const { Title, Text } = Typography;
        const FRIEND_CAPABILITY_LABELS = {
            FARM: '庄园玩法',
            FOREST: '森林玩法',
            STALL: '新村玩法'
        };
        const FRIEND_LONG_PRESS_DELAY_MS = 650;
        const FRIEND_LONG_PRESS_MOVE_TOLERANCE = 12;

        // --- Mock Data Wrappers ---
        const getTabsData = () => {
            try { return JSON.parse(window.HOOK.getTabs()); } catch (e) { return []; }
        };

        const getModelData = (code) => {
            try { return JSON.parse(window.HOOK.getModel(code)); } catch (e) { return []; }
        };

        const getFieldData = (modelCode, fieldCode) => {
            try {
                const res = JSON.parse(window.HOOK.getField(modelCode, fieldCode));
                return res.expandValue || [];
            } catch (e) {
                return [];
            }
        }

        const getFriendSelectionData = (modelCode, fieldCode) => {
            try {
                return JSON.parse(window.HOOK.getFriendSelectionData(modelCode, fieldCode)) || {};
            } catch (e) {
                return { friends: [], groups: [], field: null };
            }
        };

        const getFriendSelectionSummary = (modelCode, fieldCode) => {
            try {
                return JSON.parse(window.HOOK.getFriendSelectionSummary(modelCode, fieldCode)) || {};
            } catch (e) {
                return null;
            }
        };

        const getCapabilityLabel = (moduleKey) => {
            const normalizedKey = String(moduleKey || '').trim();
            if (!normalizedKey) return '';
            const label = FRIEND_CAPABILITY_LABELS[normalizedKey];
            return label ? `${label} (${normalizedKey})` : normalizedKey;
        };

        const buildFriendSheetIndex = (friends, groups) => {
            const normalizedGroups = Array.isArray(groups) ? groups : [];
            const groupById = {};
            const allGroupsByUser = {};
            normalizedGroups.forEach(group => {
                const groupId = String(group?.id || '').trim();
                if (!groupId) return;
                groupById[groupId] = group;
                (group.memberIds || []).forEach(userId => {
                    const normalizedUserId = String(userId || '').trim();
                    if (!normalizedUserId) return;
                    if (!allGroupsByUser[normalizedUserId]) {
                        allGroupsByUser[normalizedUserId] = [];
                    }
                    if (group.name) {
                        allGroupsByUser[normalizedUserId].push(group.name);
                    }
                });
            });
            return {
                groupById,
                allGroupsByUser
            };
        };

        const makeDefaultFriendSelectionSpec = () => ({
            includeUserIds: [],
            includeGroupIds: [],
            excludeUserIds: [],
            excludeGroupIds: [],
            relationFilter: 'MUTUAL_ONLY',
            capabilityFilter: null
        });

        const makeDefaultFriendSelectionCountSpec = () => ({
            selection: makeDefaultFriendSelectionSpec(),
            defaultCount: 1,
            groupCountOverrides: {},
            userCountOverrides: {}
        });

        const normalizeStringArray = (value) => Array.isArray(value)
            ? value.map(item => String(item || '').trim()).filter(Boolean)
            : [];

        const normalizeStringNumberMap = (value) => {
            const result = {};
            if (value && typeof value === 'object' && !Array.isArray(value)) {
                Object.entries(value).forEach(([key, rawCount]) => {
                    const normalizedKey = String(key || '').trim();
                    if (!normalizedKey) return;
                    const count = Number(rawCount);
                    result[normalizedKey] = Number.isFinite(count) ? count : 0;
                });
            }
            return result;
        };

        const parseFriendSelectionSpec = (configValue) => {
            try {
                const parsed = typeof configValue === 'string' && configValue.trim()
                    ? JSON.parse(configValue)
                    : configValue;
                if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                    return makeDefaultFriendSelectionSpec();
                }
                return {
                    includeUserIds: normalizeStringArray(parsed.includeUserIds),
                    includeGroupIds: normalizeStringArray(parsed.includeGroupIds),
                    excludeUserIds: normalizeStringArray(parsed.excludeUserIds),
                    excludeGroupIds: normalizeStringArray(parsed.excludeGroupIds),
                    relationFilter: parsed.relationFilter || 'MUTUAL_ONLY',
                    capabilityFilter: parsed.capabilityFilter || null
                };
            } catch (e) {
                return makeDefaultFriendSelectionSpec();
            }
        };

        const parseFriendSelectionCountSpec = (configValue) => {
            try {
                const parsed = typeof configValue === 'string' && configValue.trim()
                    ? JSON.parse(configValue)
                    : configValue;
                if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                    return makeDefaultFriendSelectionCountSpec();
                }
                const defaultCount = Number(parsed.defaultCount);
                return {
                    selection: parseFriendSelectionSpec(parsed.selection || {}),
                    defaultCount: Number.isFinite(defaultCount) ? defaultCount : 1,
                    groupCountOverrides: normalizeStringNumberMap(parsed.groupCountOverrides),
                    userCountOverrides: normalizeStringNumberMap(parsed.userCountOverrides)
                };
            } catch (e) {
                return makeDefaultFriendSelectionCountSpec();
            }
        };

        const makeFallbackFriendSelectionSummary = (type, configValue) => {
            if (type === 'FRIEND_SELECTION_COUNT') {
                const spec = parseFriendSelectionCountSpec(configValue).selection;
                const selectedCount = spec.includeUserIds.length + spec.includeGroupIds.length;
                const excludedCount = spec.excludeUserIds.length + spec.excludeGroupIds.length;
                return {
                    selectedCount,
                    directSelectedCount: spec.includeUserIds.length,
                    groupSelectedCount: spec.includeGroupIds.length,
                    excludedCount,
                    effectiveCount: selectedCount,
                    inactiveCount: 0,
                    hasAdvancedRules: spec.relationFilter !== 'MUTUAL_ONLY'
                };
            }
            const spec = parseFriendSelectionSpec(configValue);
            const selectedCount = spec.includeUserIds.length + spec.includeGroupIds.length;
            const excludedCount = spec.excludeUserIds.length + spec.excludeGroupIds.length;
            return {
                selectedCount,
                directSelectedCount: spec.includeUserIds.length,
                groupSelectedCount: spec.includeGroupIds.length,
                excludedCount,
                effectiveCount: selectedCount,
                inactiveCount: 0,
                hasAdvancedRules: spec.relationFilter !== 'MUTUAL_ONLY'
            };
        };

        const TIME_FIELD_TYPES = new Set(['TIME_POINT', 'TIME_POINT_LIST', 'TIME_WINDOW_LIST', 'TIME_TRIGGER', 'HOUR_OF_DAY']);

        const makeDefaultTimeToken = (meta = {}) => meta.allowSeconds ? '000000' : '0000';
        const makeDefaultTimeWindow = (meta = {}) => ({
            start: makeDefaultTimeToken(meta),
            end: meta.allowSeconds ? '003000' : '0030'
        });

        const normalizeUniqueTokens = (tokens) => {
            const next = [];
            tokens.forEach(token => {
                const normalized = String(token || '').trim();
                if (normalized && !next.includes(normalized)) {
                    next.push(normalized);
                }
            });
            return next;
        };

        const parseWindowToken = (token) => {
            const cleanToken = String(token || '').replace(/^!/, '');
            const parts = cleanToken.split('-', 2);
            return {
                start: parts[0] || '0000',
                end: parts[1] || '0030'
            };
        };

        const formatTimeToken = (token, allowSeconds = false) => {
            const normalized = String(token || '').replace(/[^\d]/g, '');
            if (normalized === '2400') {
                return '24:00';
            }
            if (allowSeconds) {
                const padded = normalized.padStart(6, '0');
                return `${padded.slice(0, 2)}:${padded.slice(2, 4)}:${padded.slice(4, 6)}`;
            }
            const padded = normalized.padStart(4, '0');
            return `${padded.slice(0, 2)}:${padded.slice(2, 4)}`;
        };

        const parseTimeInputValue = (value, allowSeconds = false) => {
            const parts = String(value || '').split(':');
            const hour = (parts[0] || '00').padStart(2, '0');
            const minute = (parts[1] || '00').padStart(2, '0');
            const second = (parts[2] || '00').padStart(2, '0');
            return allowSeconds ? `${hour}${minute}${second}` : `${hour}${minute}`;
        };

        const isZeroLengthWindow = (window) => {
            const start = String(window?.start || '').replace(/[^\d]/g, '');
            const end = String(window?.end || '').replace(/[^\d]/g, '');
            return Boolean(start) && start === end;
        };

        const hasInvalidTimeWindowState = (type, state, meta = {}) => {
            if (type === 'TIME_WINDOW_LIST') {
                return (state.windows || []).some(isZeroLengthWindow);
            }
            if (type === 'TIME_TRIGGER') {
                const allowWindows = allowsTriggerWindows(meta) ? (state.windows || []) : [];
                const blockedWindows = allowsTriggerBlockedWindows(meta) ? (state.blockedWindows || []) : [];
                return [...allowWindows, ...blockedWindows].some(isZeroLengthWindow);
            }
            return false;
        };

        const serializeWindows = (windows, prefix = '') => (windows || [])
            .filter(window => !isZeroLengthWindow(window))
            .map(window => `${prefix}${window.start}-${window.end}`)
            .filter(Boolean);

        const buildHourOptions = (allowDayEnd = false) => {
            const options = [];
            for (let hour = 0; hour <= 23; hour += 1) {
                const token = `${String(hour).padStart(2, '0')}00`;
                options.push({ value: token, label: `${String(hour).padStart(2, '0')}:00` });
            }
            if (allowDayEnd) {
                options.push({ value: '2400', label: '24:00' });
            }
            return options;
        };

        const parseTimeEditorState = (type, configValue, meta = {}) => {
            const disabled = configValue === '-1';
            const tokens = disabled
                ? []
                : String(configValue || '')
                    .split(',')
                    .map(token => token.trim())
                    .filter(Boolean);

            if (type === 'TIME_POINT') {
                return {
                    disabled,
                    point: tokens[0] || makeDefaultTimeToken(meta)
                };
            }

            if (type === 'TIME_POINT_LIST') {
                return {
                    disabled,
                    points: normalizeUniqueTokens(tokens)
                };
            }

            if (type === 'TIME_WINDOW_LIST') {
                return {
                    disabled,
                    windows: tokens.map(parseWindowToken)
                };
            }

            if (type === 'TIME_TRIGGER') {
                const points = [];
                const windows = [];
                const blockedWindows = [];
                tokens.forEach(token => {
                    if (token.startsWith('!')) {
                        blockedWindows.push(parseWindowToken(token));
                    } else if (token.includes('-')) {
                        windows.push(parseWindowToken(token));
                    } else {
                        points.push(token);
                    }
                });
                return {
                    disabled,
                    points: normalizeUniqueTokens(points),
                    windows,
                    blockedWindows
                };
            }

            if (type === 'HOUR_OF_DAY') {
                return {
                    disabled,
                    hour: tokens[0] || '0000'
                };
            }

            return { disabled };
        };

        const allowsTriggerCheckpoints = (meta = {}) => meta.allowCheckpoints !== false;
        const allowsTriggerWindows = (meta = {}) => meta.allowWindows !== false;
        const allowsTriggerBlockedWindows = (meta = {}) => meta.allowBlockedWindows === true;

        const serializeTimeEditorState = (type, state, meta = {}) => {
            if (state.disabled && meta.allowDisable) {
                return '-1';
            }

            if (type === 'TIME_POINT') {
                return state.point || makeDefaultTimeToken(meta);
            }

            if (type === 'TIME_POINT_LIST') {
                const points = normalizeUniqueTokens(state.points || []);
                if (points.length === 0) {
                    return meta.allowDisable ? '-1' : '';
                }
                return points.join(',');
            }

            if (type === 'TIME_WINDOW_LIST') {
                const windows = serializeWindows(state.windows);
                if (windows.length === 0) {
                    return meta.allowDisable ? '-1' : '';
                }
                return windows.join(',');
            }

            if (type === 'TIME_TRIGGER') {
                const pointTokens = allowsTriggerCheckpoints(meta)
                    ? normalizeUniqueTokens(state.points || [])
                    : [];
                const windowTokens = allowsTriggerWindows(meta) ? serializeWindows(state.windows) : [];
                const blockedTokens = allowsTriggerBlockedWindows(meta)
                    ? serializeWindows(state.blockedWindows, '!')
                    : [];
                const tokens = [...pointTokens, ...windowTokens, ...blockedTokens].filter(Boolean);
                if (tokens.length === 0) {
                    return '-1';
                }
                return tokens.join(',');
            }

            if (type === 'HOUR_OF_DAY') {
                return state.hour || '0000';
            }

            return '';
        };

        const TimeInputField = ({ label, value, allowSeconds, disabled, onChange }) => (
            <label className="time-input-block">
                <span className="time-input-label">{label}</span>
                <input
                    className="time-input"
                    type="time"
                    step={allowSeconds ? 1 : 60}
                    disabled={disabled}
                    value={value}
                    onChange={onChange}
                />
            </label>
        );

        const TimeTokenListEditor = ({ tokens, allowSeconds, disabled, onChange, addLabel, itemLabel, inputLabel }) => (
            <div className="time-editor-body">
                <div className="time-list">
                    {tokens.length === 0 ? (
                        <div className="time-empty">
                            {disabled ? '当前已关闭时间规则。' : `暂无${itemLabel}，点击下方按钮继续添加。`}
                        </div>
                    ) : tokens.map((token, index) => (
                        <div className="time-item" key={`${token}-${index}`}>
                            <div className="time-item-header">
                                <div className="time-item-title">{itemLabel} {index + 1}</div>
                            </div>
                            <TimeInputField
                                label={inputLabel}
                                allowSeconds={allowSeconds}
                                disabled={disabled}
                                value={formatTimeToken(token, allowSeconds)}
                                onChange={(event) => {
                                    const next = [...tokens];
                                    next[index] = parseTimeInputValue(event.target.value, allowSeconds);
                                    onChange(normalizeUniqueTokens(next));
                                }}
                            />
                            <div className="time-actions">
                                <Button
                                    className="time-action-button"
                                    size="small"
                                    theme="borderless"
                                    type="danger"
                                    disabled={disabled}
                                    onClick={() => onChange(tokens.filter((_, tokenIndex) => tokenIndex !== index))}
                                >
                                    删除此项
                                </Button>
                            </div>
                        </div>
                    ))}
                </div>
                <Button
                    className="time-add-button"
                    theme="light"
                    disabled={disabled}
                    onClick={() => onChange([...(tokens || []), makeDefaultTimeToken({ allowSeconds })])}
                >
                    {addLabel}
                </Button>
            </div>
        );

        const TimeWindowListEditor = ({ windows, allowSeconds, disabled, onChange, addLabel, itemLabel }) => (
            <div className="time-editor-body">
                <div className="time-list">
                    {windows.length === 0 ? (
                        <div className="time-empty">
                            {disabled ? '当前已关闭时间规则。' : `暂无${itemLabel}，点击下方按钮继续添加。`}
                        </div>
                    ) : windows.map((window, index) => (
                        <div className="time-item" key={`${window.start}-${window.end}-${index}`}>
                            <div className="time-item-header">
                                <div className="time-item-title">{itemLabel} {index + 1}</div>
                            </div>
                            <div className="time-input-grid">
                                <TimeInputField
                                    label="开始时间"
                                    allowSeconds={allowSeconds}
                                    disabled={disabled}
                                    value={formatTimeToken(window.start, allowSeconds)}
                                    onChange={(event) => {
                                        const next = [...windows];
                                        next[index] = { ...next[index], start: parseTimeInputValue(event.target.value, allowSeconds) };
                                        onChange(next);
                                    }}
                                />
                                <TimeInputField
                                    label="结束时间"
                                    allowSeconds={allowSeconds}
                                    disabled={disabled}
                                    value={window.end === '2400' && !allowSeconds ? '23:59' : formatTimeToken(window.end, allowSeconds)}
                                    onChange={(event) => {
                                        const next = [...windows];
                                        next[index] = { ...next[index], end: parseTimeInputValue(event.target.value, allowSeconds) };
                                        onChange(next);
                                    }}
                                />
                            </div>
                            <div className="time-actions">
                                {!allowSeconds ? (
                                    <Button
                                        className="time-action-button"
                                        size="small"
                                        theme={window.end === '2400' ? 'solid' : 'light'}
                                        type="secondary"
                                        disabled={disabled}
                                        onClick={() => {
                                            const next = [...windows];
                                            next[index] = { ...next[index], end: '2400' };
                                            onChange(next);
                                        }}
                                    >
                                        结束设为 24:00
                                    </Button>
                                ) : null}
                                <Button
                                    className="time-action-button"
                                    size="small"
                                    theme="borderless"
                                    type="danger"
                                    disabled={disabled}
                                    onClick={() => onChange(windows.filter((_, windowIndex) => windowIndex !== index))}
                                >
                                    删除此段
                                </Button>
                            </div>
                        </div>
                    ))}
                </div>
                <Button
                    className="time-add-button"
                    theme="light"
                    disabled={disabled}
                    onClick={() => onChange([...(windows || []), makeDefaultTimeWindow({ allowSeconds })])}
                >
                    {addLabel}
                </Button>
            </div>
        );

        const TimeFieldControl = ({ modelCode, item, commitFieldChange }) => {
            const meta = item.editorMeta || {};
            const [state, setState] = useState(() => parseTimeEditorState(item.type, item.configValue, meta));
            const [isExpanded, setIsExpanded] = useState(false);
            const supportsTriggerPoints = allowsTriggerCheckpoints(meta);
            const supportsTriggerWindows = allowsTriggerWindows(meta);
            const supportsTriggerBlockedWindows = allowsTriggerBlockedWindows(meta);

            useEffect(() => {
                setState(parseTimeEditorState(item.type, item.configValue, meta));
            }, [item.configValue, item.type]);

            const applyState = (nextState) => {
                setState(nextState);
                if (hasInvalidTimeWindowState(item.type, nextState, meta)) {
                    return;
                }
                commitFieldChange(modelCode, item.code, serializeTimeEditorState(item.type, nextState, meta));
            };

            const handleEnabledChange = (enabled) => {
                const nextState = { ...state, disabled: !enabled };
                if (enabled && item.type === 'TIME_POINT' && !nextState.point) {
                    nextState.point = makeDefaultTimeToken(meta);
                }
                if (enabled && item.type === 'TIME_POINT_LIST' && (!nextState.points || nextState.points.length === 0)) {
                    nextState.points = [makeDefaultTimeToken(meta)];
                }
                if (enabled && item.type === 'TIME_WINDOW_LIST' && (!nextState.windows || nextState.windows.length === 0)) {
                    nextState.windows = [makeDefaultTimeWindow(meta)];
                }
                if (enabled && item.type === 'TIME_TRIGGER') {
                    const hasAnyRule =
                        (supportsTriggerPoints && nextState.points && nextState.points.length > 0) ||
                        (supportsTriggerWindows && nextState.windows && nextState.windows.length > 0) ||
                        (supportsTriggerBlockedWindows && nextState.blockedWindows && nextState.blockedWindows.length > 0);
                    if (!hasAnyRule) {
                        if (supportsTriggerWindows) {
                            nextState.windows = [makeDefaultTimeWindow(meta)];
                        } else if (supportsTriggerPoints) {
                            nextState.points = [makeDefaultTimeToken(meta)];
                        } else if (supportsTriggerBlockedWindows) {
                            nextState.blockedWindows = [makeDefaultTimeWindow(meta)];
                        }
                    }
                }
                if (enabled && item.type === 'HOUR_OF_DAY' && !nextState.hour) {
                    nextState.hour = '0000';
                }
                applyState(nextState);
            };

            const editorClassName = state.disabled ? 'time-editor time-editor-disabled' : 'time-editor';
            const hasInvalidWindows = hasInvalidTimeWindowState(item.type, state, meta);
            const statusTitle = state.disabled ? '当前未启用' : '当前规则已生效';
            const statusNote = state.disabled
                ? '打开开关后，下面的时间规则才会参与执行。'
                : '可直接调整时间项，修改后会立即写入当前配置。';

            return (
                <div className={editorClassName}>
                    <div className="time-editor-header">
                        <div className="time-editor-status">
                            <div className="time-editor-state">{statusTitle}</div>
                            <div className="time-editor-note">{statusNote}</div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <div className="time-editor-toggle" onClick={() => setIsExpanded(!isExpanded)}>
                                {isExpanded ? '收起' : '展开'}
                                {isExpanded ? <IconChevronUp /> : <IconChevronDown />}
                            </div>
                            {meta.allowDisable ? (
                                <Switch checked={!state.disabled} onChange={handleEnabledChange} />
                            ) : null}
                        </div>
                    </div>
                    {isExpanded && (
                        <div className="time-editor-body">
                            {item.type === 'TIME_POINT' ? (
                                <div className="time-item">
                                    <TimeInputField
                                        label={meta.allowSeconds ? '执行时间（精确到秒）' : '执行时间'}
                                        allowSeconds={meta.allowSeconds}
                                        disabled={state.disabled}
                                        value={formatTimeToken(state.point, meta.allowSeconds)}
                                        onChange={(event) => applyState({
                                            ...state,
                                            point: parseTimeInputValue(event.target.value, meta.allowSeconds)
                                        })}
                                    />
                                </div>
                            ) : null}

                            {item.type === 'TIME_POINT_LIST' ? (
                                <TimeTokenListEditor
                                    tokens={state.points || []}
                                    allowSeconds={meta.allowSeconds}
                                    disabled={state.disabled}
                                    addLabel="添加时间点"
                                    itemLabel="时间点"
                                    inputLabel={meta.allowSeconds ? '触发时间（精确到秒）' : '触发时间'}
                                    onChange={(points) => applyState({ ...state, points })}
                                />
                            ) : null}

                            {item.type === 'TIME_WINDOW_LIST' ? (
                                <TimeWindowListEditor
                                    windows={state.windows || []}
                                    allowSeconds={meta.allowSeconds}
                                    disabled={state.disabled}
                                    addLabel="添加时间段"
                                    itemLabel="时间段"
                                    onChange={(windows) => applyState({ ...state, windows })}
                                />
                            ) : null}

                            {item.type === 'TIME_TRIGGER' ? (
                                <>
                                    {supportsTriggerPoints ? (
                                        <div className="time-section">
                                            <div className="time-section-title">时间点</div>
                                            <div className="time-section-desc">命中这些时刻时会触发一次。</div>
                                            <TimeTokenListEditor
                                                tokens={state.points || []}
                                                allowSeconds={meta.allowSeconds}
                                                disabled={state.disabled}
                                                addLabel="添加触发点"
                                                itemLabel="触发点"
                                                inputLabel={meta.allowSeconds ? '触发时间（精确到秒）' : '触发时间'}
                                                onChange={(points) => applyState({ ...state, points })}
                                            />
                                        </div>
                                    ) : null}
                                    {supportsTriggerWindows ? (
                                        <div className="time-section">
                                            <div className="time-section-title">允许时间段</div>
                                            <div className="time-section-desc">只有处于这些时间段内，相关动作才会触发。</div>
                                            <TimeWindowListEditor
                                                windows={state.windows || []}
                                                allowSeconds={meta.allowSeconds}
                                                disabled={state.disabled}
                                                addLabel="添加允许时间段"
                                                itemLabel="允许时间段"
                                                onChange={(windows) => applyState({ ...state, windows })}
                                            />
                                        </div>
                                    ) : null}
                                    {supportsTriggerBlockedWindows ? (
                                        <div className="time-section">
                                            <div className="time-section-title">禁止时间段</div>
                                            <div className="time-section-desc">落在这些时间段内时，会临时跳过执行。</div>
                                            <TimeWindowListEditor
                                                windows={state.blockedWindows || []}
                                                allowSeconds={meta.allowSeconds}
                                                disabled={state.disabled}
                                                addLabel="添加禁止时间段"
                                                itemLabel="禁止时间段"
                                                onChange={(blockedWindows) => applyState({ ...state, blockedWindows })}
                                            />
                                        </div>
                                    ) : null}
                                </>
                            ) : null}

                            {item.type === 'HOUR_OF_DAY' ? (
                                <div className="time-item">
                                    <label className="time-input-block">
                                        <span className="time-input-label">
                                            {meta.allowDayEnd ? '整点时刻（支持 24:00）' : '整点时刻'}
                                        </span>
                                        <select
                                            className="time-hour-select"
                                            disabled={state.disabled}
                                            value={state.hour || '0000'}
                                            onChange={(event) => applyState({ ...state, hour: event.target.value })}
                                        >
                                            {buildHourOptions(meta.allowDayEnd).map(option => (
                                                <option key={option.value} value={option.value}>{option.label}</option>
                                            ))}
                                        </select>
                                    </label>
                                </div>
                            ) : null}

                            <div className="time-helper">
                                时间段按左闭右开处理，结束时刻本身不包含在执行范围内。
                            </div>
                            {hasInvalidWindows ? (
                                <div className="time-helper time-helper-danger">
                                    开始时间和结束时间不能相同，请先调整这一段后再保存。
                                </div>
                            ) : null}
                        </div>
                    )}
                </div>
            );
        };

        // --- Main Component ---
        const App = () => {

            // 1. 处理主题自动切换逻辑
            const applyTheme = () => {
                let isDark = false;
                if (window.HOOK && window.HOOK.isNightMode) {
                    try { isDark = window.HOOK.isNightMode(); } catch (e) { }
                } else {
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) isDark = true;
                }
                const body = document.body;
                if (isDark) {
                    body.setAttribute('theme-mode', 'dark');
                    if (window.setMode) window.setMode('dark');
                } else {
                    if (body.hasAttribute('theme-mode')) body.removeAttribute('theme-mode');
                    if (window.setMode) window.setMode('light');
                }
            };
            applyTheme();

            const [tabs, setTabs] = useState([]);
            const [modelsMap, setModelsMap] = useState({});
            const [draftValues, setDraftValues] = useState({});
            const panelRefs = useRef({});

            // 列表弹窗相关的 State
            const [sheetVisible, setSheetVisible] = useState(false);
            const [sheetConfig, setSheetConfig] = useState({ modelCode: '', fieldCode: '', type: '', title: '', desc: '' });
            const [sheetList, setSheetList] = useState([]); // 完整列表数据
            const [sheetSearch, setSheetSearch] = useState(''); // 搜索关键词
            const [selectedIds, setSelectedIds] = useState(new Set()); // 选中的ID集合
            const [selectedCounts, setSelectedCounts] = useState({}); // ID对应的数值
            const [friendSheetVisible, setFriendSheetVisible] = useState(false);
            const [friendSheetLoading, setFriendSheetLoading] = useState(false);
            const [friendSheetConfig, setFriendSheetConfig] = useState({ modelCode: '', fieldCode: '', type: '', title: '', desc: '' });
            const [friendSheetData, setFriendSheetData] = useState({
                friends: [],
                groups: [],
                preview: [],
                summary: null,
                groupById: {},
                allGroupsByUser: {}
            });
            const [friendSpec, setFriendSpec] = useState(makeDefaultFriendSelectionSpec());
            const [friendCountSpec, setFriendCountSpec] = useState(makeDefaultFriendSelectionCountSpec());
            const [friendSheetSearch, setFriendSheetSearch] = useState('');
            const [friendVisibleLimit, setFriendVisibleLimit] = useState(80);
            const [friendViewMode, setFriendViewMode] = useState('all');
            const [friendExpandedSections, setFriendExpandedSections] = useState({
                groups: false,
                excludes: false,
                advanced: false
            });
            const [friendSpecDirty, setFriendSpecDirty] = useState(false);
            const [friendBatchMode, setFriendBatchMode] = useState(false);
            const [friendBatchSelectedIds, setFriendBatchSelectedIds] = useState(new Set());
            const friendSheetScrollRef = useRef(null);
            const friendSummaryCacheRef = useRef({});
            const friendLongPressTimerRef = useRef(null);
            const friendLongPressTriggeredRef = useRef(false);
            const friendLongPressStartRef = useRef(null);
            const friendSheetLoadTokenRef = useRef(0);

            // 初始化
            useEffect(() => {
                const tabsData = getTabsData();
                setTabs(tabsData);
                const initialMap = {};
                tabsData.forEach(tab => {
                    initialMap[tab.modelCode] = getModelData(tab.modelCode);
                });
                setModelsMap(initialMap);
            }, []);

            useEffect(() => {
                setFriendVisibleLimit(40);
            }, [friendSheetSearch, friendViewMode, friendSpec, friendCountSpec]);

            useEffect(() => {
                if (friendSheetVisible) return;
                friendSheetLoadTokenRef.current += 1;
                setFriendSheetLoading(false);
                setFriendBatchMode(false);
                setFriendBatchSelectedIds(new Set());
                if (friendLongPressTimerRef.current) {
                    window.clearTimeout(friendLongPressTimerRef.current);
                    friendLongPressTimerRef.current = null;
                }
                friendLongPressStartRef.current = null;
                friendLongPressTriggeredRef.current = false;
            }, [friendSheetVisible]);

            const toggleFriendBatchSelect = (userId) => {
                const normalizedUserId = String(userId || '').trim();
                if (!normalizedUserId) return;
                setFriendBatchSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(normalizedUserId)) {
                        next.delete(normalizedUserId);
                    } else {
                        next.add(normalizedUserId);
                    }
                    return next;
                });
            };

            const getFriendRowPoint = (event) => {
                const touch = event?.touches?.[0];
                if (touch) return { x: touch.clientX, y: touch.clientY };
                if (typeof event?.clientX === 'number' && typeof event?.clientY === 'number') {
                    return { x: event.clientX, y: event.clientY };
                }
                return null;
            };

            const startFriendRowLongPress = (userId, point) => {
                const normalizedUserId = String(userId || '').trim();
                if (!normalizedUserId) return;
                if (friendLongPressTimerRef.current) {
                    window.clearTimeout(friendLongPressTimerRef.current);
                }
                friendLongPressStartRef.current = point || null;
                friendLongPressTimerRef.current = window.setTimeout(() => {
                    setFriendBatchMode(true);
                    setFriendBatchSelectedIds(prev => {
                        const next = new Set(prev);
                        next.add(normalizedUserId);
                        return next;
                    });
                    friendLongPressTriggeredRef.current = true;
                    friendLongPressTimerRef.current = null;
                    friendLongPressStartRef.current = null;
                }, FRIEND_LONG_PRESS_DELAY_MS);
            };

            const cancelFriendRowLongPress = () => {
                if (friendLongPressTimerRef.current) {
                    window.clearTimeout(friendLongPressTimerRef.current);
                    friendLongPressTimerRef.current = null;
                }
                friendLongPressStartRef.current = null;
            };

            const cancelFriendRowLongPressOnMove = (point) => {
                if (!friendLongPressTimerRef.current || !friendLongPressStartRef.current || !point) return;
                const dx = Math.abs(point.x - friendLongPressStartRef.current.x);
                const dy = Math.abs(point.y - friendLongPressStartRef.current.y);
                if (Math.max(dx, dy) > FRIEND_LONG_PRESS_MOVE_TOLERANCE) {
                    cancelFriendRowLongPress();
                }
            };

            const closeFriendSheet = () => {
                friendSheetLoadTokenRef.current += 1;
                cancelFriendRowLongPress();
                friendLongPressTriggeredRef.current = false;
                setFriendSheetLoading(false);
                setFriendBatchMode(false);
                setFriendBatchSelectedIds(new Set());
                setFriendSheetVisible(false);
            };

            const getDraftKey = (modelCode, fieldCode) => `${modelCode}::${fieldCode}`;

            const clearDraftValue = (modelCode, fieldCode) => {
                const draftKey = getDraftKey(modelCode, fieldCode);
                setDraftValues(prev => {
                    if (!Object.prototype.hasOwnProperty.call(prev, draftKey)) {
                        return prev;
                    }
                    const next = { ...prev };
                    delete next[draftKey];
                    return next;
                });
            };

            const commitFieldChange = (modelCode, fieldCode, newValue) => {
                const serializedValue = newValue == null ? '' : String(newValue);
                setModelsMap(prev => {
                    let currentFields = [...(prev[modelCode] || [])];
                    const fieldIndex = currentFields.findIndex(f => f.code === fieldCode);
                    if (fieldIndex > -1) {
                        currentFields[fieldIndex] = { ...currentFields[fieldIndex], configValue: serializedValue };
                    }

                    let committed = false;
                    if (window.HOOK && window.HOOK.setField) {
                        try {
                            committed = window.HOOK.setField(modelCode, fieldCode, serializedValue) === 'SUCCESS';
                        } catch (e) {
                            committed = false;
                        }
                    }

                    if (!committed && window.HOOK && window.HOOK.setModel) {
                        const savePayload = {};
                        currentFields.forEach(f => { savePayload[f.code] = { configValue: f.configValue }; });
                        window.HOOK.setModel(modelCode, JSON.stringify(savePayload));
                    }

                    if ((window.HOOK && window.HOOK.setField) || (window.HOOK && window.HOOK.setModel)) {
                        const refreshedFields = getModelData(modelCode);
                        if (Array.isArray(refreshedFields) && refreshedFields.length > 0) {
                            currentFields = refreshedFields;
                        }
                    }

                    return { ...prev, [modelCode]: currentFields };
                });
            };

            const getCachedFriendSummary = (modelCode, fieldCode, type, configValue) => {
                const cacheKey = `${modelCode}::${fieldCode}`;
                const normalizedValue = String(configValue ?? '');
                const cached = friendSummaryCacheRef.current[cacheKey];
                if (cached && cached.configValue === normalizedValue) {
                    return cached.summary;
                }
                const summary = getFriendSelectionSummary(modelCode, fieldCode) || makeFallbackFriendSelectionSummary(type, configValue);
                friendSummaryCacheRef.current[cacheKey] = {
                    configValue: normalizedValue,
                    summary
                };
                return summary;
            };

            const handleInputDraftChange = (modelCode, fieldCode, newValue) => {
                const draftKey = getDraftKey(modelCode, fieldCode);
                setDraftValues(prev => ({ ...prev, [draftKey]: newValue ?? '' }));
            };

            const commitInputDraft = (modelCode, fieldCode, fallbackValue = '') => {
                const draftKey = getDraftKey(modelCode, fieldCode);
                const hasDraft = Object.prototype.hasOwnProperty.call(draftValues, draftKey);
                const draftValue = hasDraft ? draftValues[draftKey] : fallbackValue;
                if (String(draftValue ?? '') === String(fallbackValue ?? '')) {
                    clearDraftValue(modelCode, fieldCode);
                    return;
                }
                commitFieldChange(modelCode, fieldCode, draftValue ?? '');
                clearDraftValue(modelCode, fieldCode);
            };

            // --- 列表弹窗逻辑 (关键修改部分) ---

            const openListSheet = (modelCode, fieldItem) => {
                const { code, name, type, desc, configValue } = fieldItem;

                // 1. 先获取原始数据
                let listData = getFieldData(modelCode, code);

                // 2. 解析当前已选中的 ID，用于排序
                const newSelectedIds = new Set();
                const newSelectedCounts = {};
                try {
                    const parsed = JSON.parse(configValue);
                    if (type === 'SELECT') {
                        if (Array.isArray(parsed)) parsed.forEach(id => newSelectedIds.add(id));
                    } else if (type === 'SELECT_AND_COUNT') {
                        if (parsed && typeof parsed === 'object') {
                            Object.entries(parsed).forEach(([id, count]) => {
                                newSelectedIds.add(id);
                                newSelectedCounts[id] = count;
                            });
                        }
                    }
                } catch (e) { console.error("Parse config value failed", e); }

                // 3. 执行排序：已选中的排在最前面 (只执行一次)
                // sort 会改变原数组，这里直接操作 listData 即可
                listData.sort((a, b) => {
                    const isA = newSelectedIds.has(a.id);
                    const isB = newSelectedIds.has(b.id);
                    if (isA && !isB) return -1; // a 在前
                    if (!isA && isB) return 1;  // b 在前
                    return 0; // 保持原顺序
                });

                // 4. 将排好序的数据设置到 State
                setSheetList(listData);
                setSheetConfig({ modelCode, fieldCode: code, type, title: name, desc: desc });
                setSheetSearch('');
                setSelectedIds(newSelectedIds);
                setSelectedCounts(newSelectedCounts);
                setSheetVisible(true);
            };

            const saveSheet = () => {
                const { modelCode, fieldCode, type } = sheetConfig;
                let newValueStr = "";
                if (type === 'SELECT') {
                    const arr = Array.from(selectedIds);
                    newValueStr = JSON.stringify(arr);
                } else {
                    const obj = {};
                    selectedIds.forEach(id => {
                        obj[id] = selectedCounts[id] !== undefined ? selectedCounts[id] : 0;
                    });
                    newValueStr = JSON.stringify(obj);
                }
                commitFieldChange(modelCode, fieldCode, newValueStr);
                setSheetVisible(false);
                Toast.success("已保存列表设置");
            };

            const toggleItem = (id, checked) => {
                const newIds = new Set(selectedIds);
                if (checked) {
                    newIds.add(id);
                    if (sheetConfig.type === 'SELECT_AND_COUNT' && selectedCounts[id] === undefined) {
                        setSelectedCounts(prev => ({ ...prev, [id]: 1 }));
                    }
                } else {
                    newIds.delete(id);
                }
                setSelectedIds(newIds);
            };

            const handleCountChange = (id, val) => {
                setSelectedCounts(prev => ({ ...prev, [id]: val }));
            };

            const openFriendSheet = (modelCode, fieldItem) => {
                const { code, name, type, desc, configValue } = fieldItem;
                const loadToken = friendSheetLoadTokenRef.current + 1;
                friendSheetLoadTokenRef.current = loadToken;
                cancelFriendRowLongPress();
                friendLongPressTriggeredRef.current = false;
                setFriendSheetConfig({ modelCode, fieldCode: code, type, title: name, desc: desc });
                setFriendSheetData({
                    friends: [],
                    groups: [],
                    preview: [],
                    summary: null,
                    groupById: {},
                    allGroupsByUser: {}
                });
                if (type === 'FRIEND_SELECTION_COUNT') {
                    const countSpec = parseFriendSelectionCountSpec(configValue);
                    setFriendSpec(countSpec.selection);
                    setFriendCountSpec(countSpec);
                } else {
                    setFriendSpec(parseFriendSelectionSpec(configValue));
                    setFriendCountSpec(makeDefaultFriendSelectionCountSpec());
                }
                setFriendSheetSearch('');
                setFriendViewMode('all');
                setFriendVisibleLimit(40);
                setFriendExpandedSections({ groups: false, excludes: false, advanced: false });
                setFriendSpecDirty(false);
                setFriendBatchMode(false);
                setFriendBatchSelectedIds(new Set());
                setFriendSheetLoading(true);
                setFriendSheetVisible(true);

                const loadFriendSheetData = () => {
                    if (friendSheetLoadTokenRef.current !== loadToken) return;
                    try {
                        const payload = getFriendSelectionData(modelCode, code);
                        if (friendSheetLoadTokenRef.current !== loadToken) return;
                        const effectiveConfigValue = payload?.field?.configValue ?? configValue;
                        const data = {
                            friends: Array.isArray(payload.friends) ? payload.friends : [],
                            groups: Array.isArray(payload.groups) ? payload.groups : [],
                            preview: Array.isArray(payload.preview) ? payload.preview : [],
                            summary: payload && typeof payload.summary === 'object' && payload.summary !== null ? payload.summary : null
                        };
                        const indexData = buildFriendSheetIndex(data.friends, data.groups);
                        if (type === 'FRIEND_SELECTION_COUNT') {
                            const countSpec = parseFriendSelectionCountSpec(effectiveConfigValue);
                            setFriendSpec(countSpec.selection);
                            setFriendCountSpec(countSpec);
                        } else {
                            setFriendSpec(parseFriendSelectionSpec(effectiveConfigValue));
                            setFriendCountSpec(makeDefaultFriendSelectionCountSpec());
                        }
                        setFriendSheetData({
                            ...data,
                            ...indexData
                        });
                        friendSummaryCacheRef.current[`${modelCode}::${code}`] = {
                            configValue: String(effectiveConfigValue ?? ''),
                            summary: data.summary || makeFallbackFriendSelectionSummary(type, effectiveConfigValue)
                        };
                    } finally {
                        if (friendSheetLoadTokenRef.current === loadToken) {
                            setFriendSheetLoading(false);
                        }
                    }
                };
                if (window.requestAnimationFrame) {
                    window.requestAnimationFrame(() => window.setTimeout(loadFriendSheetData, 0));
                } else {
                    window.setTimeout(loadFriendSheetData, 0);
                }
            };

            const setFriendCountOverride = (kind, id, value) => {
                const normalizedId = String(id || '').trim();
                if (!normalizedId) return;
                const count = Number(value);
                setFriendSpecDirty(true);
                setFriendCountSpec(prev => {
                    const mapKey = kind === 'group' ? 'groupCountOverrides' : 'userCountOverrides';
                    const targetIds = kind === 'user' && friendBatchMode && friendBatchSelectedIds.size > 0
                        ? Array.from(friendBatchSelectedIds).map(item => String(item || '').trim()).filter(Boolean)
                        : [normalizedId];
                    const nextOverrides = { ...(prev[mapKey] || {}) };
                    targetIds.forEach(targetId => {
                        nextOverrides[targetId] = Number.isFinite(count) ? count : 0;
                    });
                    return {
                        ...prev,
                        [mapKey]: nextOverrides
                    };
                });
            };

            const saveFriendSheet = () => {
                if (friendSheetLoading) return;
                const { modelCode, fieldCode, type } = friendSheetConfig;
                const normalizedSpec = {
                    ...friendSpec,
                    includeUserIds: normalizeStringArray(friendSpec.includeUserIds),
                    includeGroupIds: normalizeStringArray(friendSpec.includeGroupIds),
                    excludeUserIds: normalizeStringArray(friendSpec.excludeUserIds),
                    excludeGroupIds: normalizeStringArray(friendSpec.excludeGroupIds),
                    relationFilter: friendSpec.relationFilter || 'MUTUAL_ONLY',
                    capabilityFilter: friendSpec.capabilityFilter
                };
                const newValue = type === 'FRIEND_SELECTION_COUNT'
                    ? {
                        ...friendCountSpec,
                        selection: normalizedSpec,
                        defaultCount: Number(friendCountSpec.defaultCount) || 0,
                        groupCountOverrides: normalizeStringNumberMap(friendCountSpec.groupCountOverrides),
                        userCountOverrides: normalizeStringNumberMap(friendCountSpec.userCountOverrides)
                    }
                    : normalizedSpec;
                closeFriendSheet();
                window.setTimeout(() => {
                    commitFieldChange(modelCode, fieldCode, JSON.stringify(newValue));
                    Toast.success("已保存好友选择");
                }, 0);
            };

            const scrollToPanel = (modelCode) => {
                const alignPanel = (behavior = 'smooth') => {
                    const panelNode = panelRefs.current[modelCode];
                    if (panelNode && typeof panelNode.getBoundingClientRect === 'function') {
                        const targetTop = window.pageYOffset + panelNode.getBoundingClientRect().top - 80;
                        window.scrollTo({ top: Math.max(0, targetTop), behavior });
                    } else {
                        window.scrollTo({ top: 0, behavior });
                    }
                };
                if (window.requestAnimationFrame) {
                    window.requestAnimationFrame(() => alignPanel('smooth'));
                } else {
                    alignPanel('smooth');
                }
                [180, 360, 560].forEach(delay => {
                    window.setTimeout(() => alignPanel(delay === 560 ? 'auto' : 'smooth'), delay);
                });
            };

            const scrollFriendSheetTo = (target) => {
                const container = friendSheetScrollRef.current;
                if (!container || typeof container.scrollTo !== 'function') return;
                if (target === 'top') {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                const top = Math.max(0, container.scrollHeight - container.clientHeight);
                container.scrollTo({ top, behavior: 'smooth' });
            };

            const renderFieldLabel = (name, desc, todayInactive, todayInactiveReason) => (
                <div className="field-label">
                    <div className="field-name">{name}</div>
                    {desc ? <div className="field-desc">{desc}</div> : null}
                    {todayInactive ? <div className="field-status">{todayInactiveReason || '今日已停止执行'}</div> : null}
                </div>
            );

            const toggleAll = () => {
                const filteredList = sheetList.filter(item => item.name.includes(sheetSearch));
                const allSelected = filteredList.every(item => selectedIds.has(item.id));
                const newIds = new Set(selectedIds);
                filteredList.forEach(item => {
                    if (allSelected) {
                        newIds.delete(item.id);
                    } else {
                        newIds.add(item.id);
                        if (sheetConfig.type === 'SELECT_AND_COUNT' && selectedCounts[item.id] === undefined) {
                            setSelectedCounts(prev => ({ ...prev, [item.id]: 1 }));
                        }
                    }
                });
                setSelectedIds(newIds);
            };

            // 渲染过滤后的列表 (注意：这里不再包含排序逻辑)
            const renderSheetList = () => {
                const filtered = sheetList.filter(item => item.name.toLowerCase().includes(sheetSearch.toLowerCase()));

                if (filtered.length === 0) return <div style={{ padding: '1.25rem', textAlign: 'center', color: '#999' }}>无数据</div>;

                return filtered.map(item => {
                    const isChecked = selectedIds.has(item.id);
                    return (
                        <div key={item.id} className="list-item">
                            <div className="list-item-left" onClick={() => toggleItem(item.id, !isChecked)}>
                                <Checkbox checked={isChecked} style={{ pointerEvents: 'none' }} />
                                <span className="list-item-name">{item.name}</span>
                            </div>
                            {sheetConfig.type === 'SELECT_AND_COUNT' && isChecked && (
                                <InputNumber
                                    className="list-count-input"
                                    size="small"
                                    min={0}
                                    value={selectedCounts[item.id] || 0}
                                    onChange={(v) => handleCountChange(item.id, v)}
                                    placeholder="数量"
                                />
                            )}
                        </div>
                    );
                });
            };

            const renderFriendSheet = () => {
                if (friendSheetLoading) {
                    return <div style={{ padding: '2rem 1rem', textAlign: 'center', color: 'var(--semi-color-text-2)' }}>正在加载好友数据...</div>;
                }
                const groups = friendSheetData.groups || [];
                const friends = friendSheetData.friends || [];
                const isCountField = friendSheetConfig.type === 'FRIEND_SELECTION_COUNT';
                const includeUserIds = new Set(friendSpec.includeUserIds || []);
                const includeGroupIds = new Set(friendSpec.includeGroupIds || []);
                const excludeUserIds = new Set(friendSpec.excludeUserIds || []);
                const excludeGroupIds = new Set(friendSpec.excludeGroupIds || []);
                const groupById = friendSheetData.groupById || {};
                const allGroupsByUser = friendSheetData.allGroupsByUser || {};
                const selectedGroupsByUser = {};
                const excludedGroupsByUser = {};
                includeGroupIds.forEach(groupId => {
                    const group = groupById[groupId];
                    if (!group) return;
                    (group.memberIds || []).forEach(userId => {
                        if (!selectedGroupsByUser[userId]) selectedGroupsByUser[userId] = [];
                        selectedGroupsByUser[userId].push(group);
                    });
                });
                excludeGroupIds.forEach(groupId => {
                    const group = groupById[groupId];
                    if (!group) return;
                    (group.memberIds || []).forEach(userId => {
                        if (!excludedGroupsByUser[userId]) excludedGroupsByUser[userId] = [];
                        excludedGroupsByUser[userId].push(group);
                    });
                });

                const setSelectionMode = (includeKey, excludeKey, id, mode) => {
                    const normalizedId = String(id || '').trim();
                    if (!normalizedId) return;
                    const targetIds = friendBatchMode && friendBatchSelectedIds.size > 0
                        ? Array.from(friendBatchSelectedIds).map(item => String(item || '').trim()).filter(Boolean)
                        : [normalizedId];
                    setFriendSpecDirty(true);
                    setFriendSpec(prev => {
                        const includeValues = new Set(prev[includeKey] || []);
                        const excludeValues = new Set(prev[excludeKey] || []);
                        targetIds.forEach(targetId => {
                            includeValues.delete(targetId);
                            excludeValues.delete(targetId);
                            if (mode === 'include') includeValues.add(targetId);
                            if (mode === 'exclude') excludeValues.add(targetId);
                        });
                        return {
                            ...prev,
                            [includeKey]: Array.from(includeValues),
                            [excludeKey]: Array.from(excludeValues)
                        };
                    });
                };

                const relationLabel = (relation) => relation === 'MUTUAL'
                    ? '互关'
                    : relation === 'ONE_WAY'
                        ? '单向'
                        : relation === 'REMOVED'
                            ? '失效'
                            : relation || '未知';

                const relationPasses = (friend) => {
                    const relation = friend.removed ? 'REMOVED' : friend.relation;
                    const filter = friendSpec.relationFilter || 'MUTUAL_ONLY';
                    if (filter === 'MUTUAL_ONLY') return relation === 'MUTUAL' && !friend.removed;
                    if (filter === 'ALL_KNOWN') return relation && relation !== 'UNKNOWN' && relation !== 'SELF' && relation !== 'REMOVED' && !friend.removed;
                    if (filter === 'INCLUDE_SELF') return relation === 'SELF' || (relation === 'MUTUAL' && !friend.removed);
