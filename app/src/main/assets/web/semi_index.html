                    return relation === 'MUTUAL' && !friend.removed;
                };

                const capabilityResult = (friend) => {
                    const filter = friendSpec.capabilityFilter;
                    const moduleKeys = filter?.moduleKeys || [];
                    if (moduleKeys.length === 0) return { passes: true, stateText: '' };
                    const requiredStates = filter.requiredStates?.length ? filter.requiredStates : ['OPEN'];
                    const stateTexts = [];
                    for (const key of moduleKeys) {
                        const state = friend.capabilities?.[key]?.state || 'UNKNOWN';
                        stateTexts.push(`${getCapabilityLabel(key)}:${state}`);
                        if (state === 'UNKNOWN' && filter.includeUnknown === false) {
                            return { passes: false, reason: '未确认开通该玩法', stateText: stateTexts.join(' | ') };
                        }
                        if (state !== 'UNKNOWN' && !requiredStates.includes(state)) {
                            return { passes: false, reason: '未开通或不可用', stateText: stateTexts.join(' | ') };
                        }
                    }
                    return { passes: true, stateText: stateTexts.join(' | ') };
                };

                const getCountInfo = (friendId, selectedGroupIds) => {
                    if (!isCountField) return { count: null, source: '' };
                    const userOverrides = friendCountSpec.userCountOverrides || {};
                    const groupOverrides = friendCountSpec.groupCountOverrides || {};
                    if (Object.prototype.hasOwnProperty.call(userOverrides, friendId)) {
                        return { count: Number(userOverrides[friendId]) || 0, source: '个人次数' };
                    }
                    for (const groupId of friendSpec.includeGroupIds || []) {
                        if (!selectedGroupIds.includes(groupId)) continue;
                        if (Object.prototype.hasOwnProperty.call(groupOverrides, groupId)) {
                            const groupName = groupById[groupId]?.name || '';
                            return { count: Number(groupOverrides[groupId]) || 0, source: groupName ? `分组次数:${groupName}` : '分组次数' };
                        }
                    }
                    return { count: Number(friendCountSpec.defaultCount) || 0, source: '默认次数' };
                };

                const rankPreviewItem = (item) => item.effective ? 0 : item.selected ? 1 : item.excluded ? 2 : 3;
                const shouldUseBackendPreview = !friendSpecDirty && Array.isArray(friendSheetData.preview) && friendSheetData.preview.length > 0;

                const localPreviewItems = shouldUseBackendPreview ? [] : friends.map(friend => {
                    const selectedGroups = selectedGroupsByUser[friend.id] || [];
                    const excludedGroups = excludedGroupsByUser[friend.id] || [];
                    const selectedDirectly = includeUserIds.has(friend.id);
                    const excludedDirectly = excludeUserIds.has(friend.id);
                    const selectedByGroupIds = selectedGroups.map(group => group.id);
                    const excludedByGroupIds = excludedGroups.map(group => group.id);
                    const selected = selectedDirectly || selectedByGroupIds.length > 0;
                    const excluded = excludedDirectly || excludedByGroupIds.length > 0;
                    const capability = capabilityResult(friend);
                    const countInfo = getCountInfo(friend.id, selectedByGroupIds);
                    let inactiveReason = '';
                    if (selected && excluded) inactiveReason = '已排除';
                    else if (selected && friend.globalBlocked) inactiveReason = '全局黑名单';
                    else if (selected && !relationPasses(friend)) inactiveReason = '单向/失效好友';
                    else if (selected && !capability.passes) inactiveReason = capability.reason;
                    else if (selected && isCountField && (countInfo.count || 0) <= 0) inactiveReason = '次数为 0';
                    const effective = selected && !inactiveReason;
                    return {
                        id: friend.id,
                        name: friend.name || friend.id,
                        relation: friend.removed ? 'REMOVED' : friend.relation,
                        globalBlocked: Boolean(friend.globalBlocked),
                        selectedDirectly,
                        selectedByGroups: selectedGroups.map(group => group.name),
                        selectedByGroupIds,
                        excludedDirectly,
                        excludedByGroups: excludedGroups.map(group => group.name),
                        excludedByGroupIds,
                        allGroupNames: allGroupsByUser[friend.id] || [],
                        selected,
                        excluded,
                        effective,
                        inactiveReason,
                        capabilityState: capability.stateText,
                        count: countInfo.count,
                        countSource: countInfo.source
                    };
                }).sort((a, b) => {
                    const rankDiff = rankPreviewItem(a) - rankPreviewItem(b);
                    if (rankDiff !== 0) return rankDiff;
                    return String(a.name).localeCompare(String(b.name), 'zh-Hans-CN');
                });
                const selectedItems = localPreviewItems.filter(item => item.selected);
                const inactiveItems = selectedItems.filter(item => !item.effective);
                const localSummary = {
                    selectedCount: selectedItems.length,
                    directSelectedCount: localPreviewItems.filter(item => item.selectedDirectly).length,
                    groupSelectedCount: localPreviewItems.filter(item => item.selectedByGroups.length > 0).length,
                    excludedCount: localPreviewItems.filter(item => item.excluded).length,
                    effectiveCount: selectedItems.filter(item => item.effective).length,
                    inactiveCount: inactiveItems.length,
                    hasAdvancedRules: (friendSpec.relationFilter || 'MUTUAL_ONLY') !== 'MUTUAL_ONLY'
                };
                const backendPreviewItems = shouldUseBackendPreview ? (Array.isArray(friendSheetData.preview) ? friendSheetData.preview : [])
                    .map(item => {
                        const id = String(item?.userId || item?.id || '').trim();
                        if (!id) return null;
                        const selectedDirectly = Boolean(item?.selectedDirectly);
                        const selectedByGroupIds = normalizeStringArray(item?.selectedByGroupIds);
                        const excludedDirectly = Boolean(item?.excludedDirectly);
                        const excludedByGroupIds = normalizeStringArray(item?.excludedByGroupIds);
                        const selected = selectedDirectly || selectedByGroupIds.length > 0;
                        const excluded = excludedDirectly || excludedByGroupIds.length > 0;
                        return {
                            id,
                            name: String(item?.displayName || item?.name || id),
                            relation: item?.relation || 'UNKNOWN',
                            globalBlocked: Boolean(item?.globalBlocked),
                            selectedDirectly,
                            selectedByGroups: normalizeStringArray(item?.selectedByGroups),
                            selectedByGroupIds,
                            excludedDirectly,
                            excludedByGroups: normalizeStringArray(item?.excludedByGroups),
                            excludedByGroupIds,
                            allGroupNames: allGroupsByUser[id] || [],
                            selected,
                            excluded,
                            effective: Boolean(item?.effective),
                            inactiveReason: item?.inactiveReason || '',
                            capabilityState: item?.capabilityState || '',
                            count: item?.count == null ? null : Number(item.count),
                            countSource: item?.countSource || ''
                        };
                    })
                    .filter(Boolean)
                    .sort((a, b) => {
                        const rankDiff = rankPreviewItem(a) - rankPreviewItem(b);
                        if (rankDiff !== 0) return rankDiff;
                        return String(a.name).localeCompare(String(b.name), 'zh-Hans-CN');
                    }) : [];
                const backendSummary = shouldUseBackendPreview && friendSheetData.summary && typeof friendSheetData.summary === 'object'
                    ? friendSheetData.summary
                    : null;
                const backendSummaryFallback = shouldUseBackendPreview ? {
                    selectedCount: backendPreviewItems.filter(item => item.selected).length,
                    directSelectedCount: backendPreviewItems.filter(item => item.selectedDirectly).length,
                    groupSelectedCount: backendPreviewItems.filter(item => item.selectedByGroups.length > 0).length,
                    excludedCount: backendPreviewItems.filter(item => item.excluded).length,
                    effectiveCount: backendPreviewItems.filter(item => item.effective).length,
                    inactiveCount: backendPreviewItems.filter(item => item.selected && !item.effective).length,
                    hasAdvancedRules: (friendSpec.relationFilter || 'MUTUAL_ONLY') !== 'MUTUAL_ONLY'
                } : null;
                const previewItems = shouldUseBackendPreview ? backendPreviewItems : localPreviewItems;
                const summary = shouldUseBackendPreview
                    ? { ...(backendSummaryFallback || {}), ...(backendSummary || {}) }
                    : localSummary;
                const lowerSearch = friendSheetSearch.toLowerCase();
                const matchesSearch = (item) => {
                    const haystack = [
                        item.name,
                        item.id,
                        ...(item.allGroupNames || []),
                        ...(item.selectedByGroups || []),
                        ...(item.excludedByGroups || [])
                    ].join(' ').toLowerCase();
                    return !lowerSearch || haystack.includes(lowerSearch);
                };
                const matchesViewMode = (item) => {
                    if (friendViewMode === 'effective') return item.effective;
                    if (friendViewMode === 'selected') return item.selected;
                    if (friendViewMode === 'excluded') return item.excluded;
                    if (friendViewMode === 'inactive') return item.selected && !item.effective;
                    return true;
                };
                const filteredItems = previewItems.filter(item => matchesSearch(item) && matchesViewMode(item));
                const filteredIds = filteredItems
                    .map(item => String(item.id || '').trim())
                    .filter(Boolean);
                const visibleItems = filteredItems.slice(0, friendVisibleLimit);
                const selectedGroupNames = (friendSpec.includeGroupIds || [])
                    .map(groupId => groupById[groupId]?.name)
                    .filter(Boolean);
                const renderSummaryItem = (label, value, tone) => (
                    <div style={{ flex: '1 1 6.5rem', padding: '0.75rem', borderRadius: '0.5rem', background: 'var(--semi-color-fill-0)' }}>
                        <div style={{ fontSize: '1.125rem', fontWeight: 700, color: tone || 'var(--semi-color-text-0)' }}>{value}</div>
                        <div style={{ fontSize: '0.75rem', color: 'var(--semi-color-text-2)' }}>{label}</div>
                    </div>
                );

                const sectionTitle = (key, title, suffix) => (
                    <div
                        className="friend-section-title"
                        onClick={() => setFriendExpandedSections(prev => ({ ...prev, [key]: !prev[key] }))}
                    >
                        <Text strong>{title}</Text>
                        <Text type="secondary">{suffix} · {friendExpandedSections[key] ? '收起' : '展开'}</Text>
                    </div>
                );

                const renderGroupRow = (group) => {
                    const included = includeGroupIds.has(group.id);
                    const excluded = excludeGroupIds.has(group.id);
                    const value = excluded ? 'exclude' : included ? 'include' : 'none';
                    return (
                        <div className="list-item" key={group.id}>
                            <div className="list-item-left">
                                <span className="list-item-name">{group.name} ({(group.memberIds || []).length})</span>
                            </div>
                            <RadioGroup
                                type="button"
                                value={value}
                                onChange={(e) => setSelectionMode('includeGroupIds', 'excludeGroupIds', group.id, e.target.value)}
                            >
                                <Radio value="include">选中</Radio>
                                <Radio value="exclude">排除</Radio>
                                <Radio value="none">未选</Radio>
                            </RadioGroup>
                            {isCountField && included ? (
                                <InputNumber
                                    className="list-count-input"
                                    size="small"
                                    min={0}
                                    value={(friendCountSpec.groupCountOverrides || {})[group.id] ?? friendCountSpec.defaultCount ?? 1}
                                    onChange={(v) => setFriendCountOverride('group', group.id, v)}
                                    placeholder="次数"
                                />
                            ) : null}
                        </div>
                    );
                };

                const renderFriendRow = (item) => {
                    const value = item.excludedDirectly ? 'exclude' : item.selectedDirectly ? 'include' : 'none';
                    const isBatchSelected = friendBatchSelectedIds.has(item.id);
                    const sourceText = [
                        item.selectedDirectly ? '已单独选中' : '',
                        item.selectedByGroups.length ? `来自分组：${item.selectedByGroups.join('、')}` : '',
                        item.excludedDirectly ? '已单独排除' : '',
                        item.excludedByGroups.length ? `排除分组：${item.excludedByGroups.join('、')}` : ''
                    ].filter(Boolean).join(' | ');
                    const stateText = item.effective
                        ? (isCountField ? `生效次数 ${item.count} (${item.countSource})` : '生效')
                        : item.selected
                            ? `不生效：${item.inactiveReason || '未满足规则'}`
                            : item.excluded
                                ? '已排除'
                                : '未选中';
                    return (
                        <div
                            className="friend-list-item"
                            key={item.id}
                            onMouseDown={(e) => startFriendRowLongPress(item.id, getFriendRowPoint(e))}
                            onMouseMove={(e) => cancelFriendRowLongPressOnMove(getFriendRowPoint(e))}
                            onMouseUp={cancelFriendRowLongPress}
                            onMouseLeave={cancelFriendRowLongPress}
                            onTouchStart={(e) => startFriendRowLongPress(item.id, getFriendRowPoint(e))}
                            onTouchMove={(e) => cancelFriendRowLongPressOnMove(getFriendRowPoint(e))}
                            onTouchEnd={cancelFriendRowLongPress}
                            onTouchCancel={cancelFriendRowLongPress}
                            onContextMenu={(e) => {
                                e.preventDefault();
                                cancelFriendRowLongPress();
                                setFriendBatchMode(true);
                                friendLongPressTriggeredRef.current = true;
                                setFriendBatchSelectedIds(prev => {
                                    const next = new Set(prev);
                                    next.add(item.id);
                                    return next;
                                });
                            }}
                            onClick={(e) => {
                                if (friendLongPressTriggeredRef.current) {
                                    friendLongPressTriggeredRef.current = false;
                                    return;
                                }
                                if (!friendBatchMode) return;
                                if (e.target && typeof e.target.closest === 'function') {
                                    if (e.target.closest('.friend-list-actions')) return;
                                }
                                toggleFriendBatchSelect(item.id);
                            }}
                        >
                            <div className="friend-list-main">
                                {friendBatchMode ? (
                                    <div style={{ marginBottom: '0.25rem' }} onClick={(e) => e.stopPropagation()}>
                                        <Checkbox
                                            checked={isBatchSelected}
                                            onChange={() => toggleFriendBatchSelect(item.id)}
                                        >
                                            多选
                                        </Checkbox>
                                    </div>
                                ) : null}
                                <div className="friend-list-title">{item.name} · {relationLabel(item.relation)}</div>
                                <div className="friend-list-meta">{item.id}</div>
                                {sourceText ? <div className="friend-list-meta">{sourceText}</div> : null}
                                {item.capabilityState ? <div className="friend-list-meta">{item.capabilityState}</div> : null}
                                <div className={item.effective ? 'friend-state-effective' : 'friend-state-inactive'}>{stateText}</div>
                            </div>
                            <div className="friend-list-actions">
                                <RadioGroup
                                    type="button"
                                    value={value}
                                    onChange={(e) => setSelectionMode('includeUserIds', 'excludeUserIds', item.id, e.target.value)}
                                >
                                    <Radio value="include">选中</Radio>
                                    <Radio value="exclude">排除</Radio>
                                    <Radio value="none">未选</Radio>
                                </RadioGroup>
                                {isCountField && item.selected && !item.excluded ? (
                                    <InputNumber
                                        className="list-count-input"
                                        size="small"
                                        min={0}
                                        value={item.count ?? 0}
                                        onChange={(v) => setFriendCountOverride('user', item.id, v)}
                                        placeholder="次数"
                                    />
                                ) : null}
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="friend-sheet">
                        {friendSheetConfig.desc ? <Text>{friendSheetConfig.desc}</Text> : null}
                        <div className="friend-summary-panel">
                            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                                {renderSummaryItem('最终生效', summary.effectiveCount, 'var(--semi-color-success)')}
                                {renderSummaryItem('已选来源', summary.selectedCount)}
                                {renderSummaryItem('排除', summary.excludedCount, 'var(--semi-color-danger)')}
                                {renderSummaryItem('未生效', summary.inactiveCount, summary.inactiveCount > 0 ? 'var(--semi-color-warning)' : undefined)}
                            </div>
                            {selectedGroupNames.length > 0 ? (
                                <div className="friend-summary-note">已选分组：{selectedGroupNames.join('、')}</div>
                            ) : null}
                            {summary.hasAdvancedRules ? <div className="friend-summary-note">已启用高级规则</div> : null}
                        </div>
                        <div className="friend-toolbar">
                            <Input
                                prefix={<IconSearch />}
                                placeholder="搜索好友、ID 或分组..."
                                value={friendSheetSearch}
                                onChange={setFriendSheetSearch}
                            />
                            <RadioGroup
                                type="button"
                                value={friendViewMode}
                                onChange={(e) => setFriendViewMode(e.target.value)}
                                style={{ marginTop: '0.75rem' }}
                            >
                                <Radio value="all">全部</Radio>
                                <Radio value="effective">已生效</Radio>
                                <Radio value="selected">已选</Radio>
                                <Radio value="excluded">排除</Radio>
                                <Radio value="inactive">未生效</Radio>
                            </RadioGroup>
                            {friendBatchMode ? (
                                <div style={{ marginTop: '0.75rem', display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                                    <Button onClick={() => setFriendBatchSelectedIds(new Set(filteredIds))} disabled={filteredIds.length === 0}>全选</Button>
                                    <Button
                                        onClick={() => {
                                            setFriendBatchSelectedIds(prev => {
                                                const next = new Set(prev);
                                                filteredIds.forEach(id => {
                                                    if (next.has(id)) next.delete(id); else next.add(id);
                                                });
                                                return next;
                                            });
                                        }}
                                        disabled={filteredIds.length === 0}
                                    >
                                        反选
                                    </Button>
                                    <Button onClick={() => {
                                        setFriendBatchMode(false);
                                        setFriendBatchSelectedIds(new Set());
                                        friendLongPressTriggeredRef.current = false;
                                    }}>取消</Button>
                                    <Text type="tertiary">已选 {friendBatchSelectedIds.size} 人</Text>
                                </div>
                            ) : null}
                            <div style={{ marginTop: '0.75rem', display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                                <Text type="tertiary">当前筛选 {filteredItems.length} 人</Text>
                            </div>
                            {isCountField ? (
                                <div style={{ marginTop: '0.75rem' }}>
                                    <Text strong>默认次数</Text>
                                    <InputNumber
                                        style={{ marginLeft: '0.75rem', width: '6rem' }}
                                        min={0}
                                        value={friendCountSpec.defaultCount ?? 1}
                                        onChange={(v) => {
                                            setFriendSpecDirty(true);
                                            setFriendCountSpec(prev => ({ ...prev, defaultCount: Number(v) || 0 }));
                                        }}
                                    />
                                </div>
                            ) : null}
                        </div>
                        <div style={{ padding: '0.5rem 1rem 0' }}>
                            {sectionTitle('groups', '选择分组', `${selectedGroupNames.length} 个已选`)}
                            {friendExpandedSections.groups ? (
                                groups.length === 0
                                    ? <div style={{ padding: '0.75rem 0', color: '#999' }}>暂无分组，请先到好友中心创建。</div>
                                    : groups.map(renderGroupRow)
                            ) : null}
                        </div>
                        <div className="friend-list-panel">
                            <Text strong>选择好友</Text>
                            {filteredItems.length === 0 ? (
                                <div style={{ padding: '0.75rem 0', color: '#999' }}>无匹配好友</div>
                            ) : (
                                visibleItems.map(renderFriendRow)
                            )}
                            {visibleItems.length < filteredItems.length ? (
                                <Button
                                    block
                                    style={{ marginTop: '0.75rem' }}
                                    onClick={() => setFriendVisibleLimit(prev => prev + 80)}
                                >
                                    加载更多 ({visibleItems.length}/{filteredItems.length})
                                </Button>
                            ) : null}
                        </div>
                        <div style={{ padding: '0.5rem 1rem 0' }}>
                            {sectionTitle('excludes', '单独排除', `${summary.excludedCount} 项`)}
                            {friendExpandedSections.excludes ? (
                                previewItems.filter(item => item.excluded).slice(0, 80).map(renderFriendRow)
                            ) : null}
                        </div>
                        <div style={{ padding: '0.5rem 1rem 0' }}>
                            {sectionTitle('advanced', '高级规则', summary.hasAdvancedRules ? '已启用' : '默认')}
                            {friendExpandedSections.advanced ? (
                                <div className="friend-advanced-panel">
                                    <div>
                                        <Text strong>生效关系</Text>
                                        <RadioGroup
                                            type="button"
                                            value={friendSpec.relationFilter || 'MUTUAL_ONLY'}
                                            onChange={(e) => {
                                                setFriendSpecDirty(true);
                                                setFriendSpec(prev => ({ ...prev, relationFilter: e.target.value }));
                                            }}
                                            style={{ marginTop: '0.5rem' }}
                                        >
                                            <Radio value="MUTUAL_ONLY">仅互关好友</Radio>
                                            <Radio value="ALL_KNOWN">已知好友</Radio>
                                            <Radio value="INCLUDE_SELF">含自己</Radio>
                                        </RadioGroup>
                                    </div>
                                    <div className="friend-summary-note" style={{ marginTop: '0.75rem' }}>
                                        玩法开通过滤已默认开启且不可配置：仅对已确认开通当前玩法的好友生效。
                                    </div>
                                </div>
                            ) : null}
                        </div>
                    </div>
                );
            };

            // --- 渲染主界面配置项 ---
            const renderFieldItem = (modelCode, item) => {
                const { type, name, code, configValue, desc, expandKey, todayInactive, todayInactiveReason } = item;
                const rowClassName = todayInactive ? 'field-row field-row-inactive' : 'field-row';
                const choiceRowClassName = todayInactive ? 'field-choice-row field-row-inactive' : 'field-choice-row';
                if (type === 'BOOLEAN') {
                    return (
                        <div className={rowClassName} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div className="field-control">
                                <Switch checked={configValue === 'true'} onChange={(v) => commitFieldChange(modelCode, code, v)} />
                            </div>
                        </div>
                    );
                }
                if (TIME_FIELD_TYPES.has(type)) {
                    return (
                        <div className={`${rowClassName} time-field-row`} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div className="field-control field-control-time">
                                <TimeFieldControl
                                    modelCode={modelCode}
                                    item={item}
                                    commitFieldChange={commitFieldChange}
                                />
                            </div>
                        </div>
                    );
                }
                if (['MULTIPLY_INTEGER', 'LIST', 'INTEGER', 'STRING', 'TEXT'].includes(type)) {
                    const draftKey = getDraftKey(modelCode, code);
                    const inputValue = Object.prototype.hasOwnProperty.call(draftValues, draftKey)
                        ? draftValues[draftKey]
                        : configValue;
                    return (
                        <div className={rowClassName} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div className="field-control" style={{ width: '50%' }}>
                                <Input
                                    value={inputValue}
                                    onChange={(v) => handleInputDraftChange(modelCode, code, v)}
                                    onBlur={() => commitInputDraft(modelCode, code, configValue)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            if (e.currentTarget && typeof e.currentTarget.blur === 'function') {
                                                e.currentTarget.blur();
                                            } else {
                                                commitInputDraft(modelCode, code, configValue);
                                            }
                                        }
                                    }}
                                    placeholder="请输入..."
                                />
                            </div>
                        </div>
                    );
                }
                if (type === 'URL_TEXT') {
                    return (
                        <div className={rowClassName} key={code}>
                            <div style={{ flex: 1 }}>
                                {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                                <Text link={{ href: configValue }}>{configValue}</Text>
                            </div>
                        </div>
                    );
                }
                if (type === 'CHOICE') {
                    return (
                        <div className={choiceRowClassName} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div style={{ marginTop: '0.5rem' }}>
                                <RadioGroup type="button" value={Number(configValue)} onChange={(e) => commitFieldChange(modelCode, code, e.target.value)}>
                                    {expandKey && expandKey.map((label, idx) => (<Radio value={idx} key={idx}>{label}</Radio>))}
                                </RadioGroup>
                            </div>
                        </div>
                    );
                }
                if (['SELECT', 'SELECT_AND_COUNT'].includes(type)) {
                    let count = 0;
                    try {
                        const parsed = JSON.parse(configValue);
                        count = Array.isArray(parsed) ? parsed.length : Object.keys(parsed).length;
                    } catch (e) { }
                    return (
                        <div className={rowClassName} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div className="field-control">
                                <Button theme='solid' type='secondary' onClick={() => openListSheet(modelCode, item)}>
                                    已选 {count} 项
                                </Button>
                            </div>
                        </div>
                    )
                }
                if (['FRIEND_SELECTION', 'FRIEND_SELECTION_COUNT'].includes(type)) {
                    const summary = getCachedFriendSummary(modelCode, code, type, configValue);
                    return (
                        <div className={rowClassName} key={code}>
                            {renderFieldLabel(name, desc, todayInactive, todayInactiveReason)}
                            <div className="field-control">
                                <Button theme='solid' type='secondary' onClick={() => openFriendSheet(modelCode, item)}>
                                    生效 {summary.effectiveCount || 0} / 已选 {summary.selectedCount || 0} / 排除 {summary.excludedCount || 0}
                                </Button>
                                {(summary.inactiveCount || 0) > 0 ? (
                                    <div className="field-status">有 {summary.inactiveCount} 人未生效</div>
                                ) : null}
                            </div>
                        </div>
                    )
                }
                return null;
            };

            return (
                <div className="container">
                    <div className="header">
                        <Title heading={2} style={{ margin: 0 }}>Sesame-AG 设置</Title>
                        <Button disabled theme="borderless">项目仓库主页</Button>
                        <Text style={{ marginRight: '0.9375rem' }} link={{ href: 'https://github.com/Sesame-AG/Sesame-AG' }}> ➤GitHub </Text>
                        <Button style={{}} onClick={switchMode} > 切换主题 </Button>
                    </div>

                    <div className="section-padding">
                        <Collapse accordion defaultActiveKey={tabs[0]?.modelCode}>
                            {tabs.map((tab) => (
                                <Collapse.Panel
                                    header={
                                        <div
                                            ref={(node) => {
                                                if (node) {
                                                    panelRefs.current[tab.modelCode] = node;
                                                } else {
                                                    delete panelRefs.current[tab.modelCode];
                                                }
                                            }}
                                            style={{ fontWeight: 600, scrollMarginTop: '5rem' }}
                                            onClick={() => scrollToPanel(tab.modelCode)}
                                        >
                                            {tab.modelName}
                                        </div>
                                    }
                                    itemKey={tab.modelCode}
                                    key={tab.modelCode}
                                >
                                    <div>
                                        {modelsMap[tab.modelCode] ? (
                                            modelsMap[tab.modelCode].map(field => renderFieldItem(tab.modelCode, field))
                                        ) : (
                                            <div style={{ padding: '1.25rem', textAlign: 'center' }}>加载中...</div>
                                        )}
                                    </div>
                                </Collapse.Panel>
                            ))}
                        </Collapse>
                    </div>

                    <div style={{ padding: '1.25rem', textAlign: 'center' }}>
                        <Button
                            theme='solid'
                            type='danger'
                            block
                            onClick={() => {
                                if (window.HOOK && window.HOOK.saveOnExit) {
                                    window.HOOK.saveOnExit();
                                } else if (window.Android && window.Android.onExit) {
                                    window.Android.onExit();
                                } else {
                                    console.log("模拟: 保存并退出");
                                }
                            }}
                        >
                            退出并保存
                        </Button>
                        <Text style={{ marginTop: '0.9375rem', color: '#999', fontSize: '0.75rem' }}> GitHub </Text>
                        <div style={{ marginTop: '0.3125rem', color: '#999', fontSize: '0.875rem' }}>Power by <Text link={{ href: 'https://semi.design/' }}>Semi.Design</Text></div>
                        <div style={{ marginTop: '0.3125rem', color: '#999', fontSize: '0.875rem' }}>Ver: {window.HOOK.getBuildInfo()}</div>
                    </div>

                    {/* 好友选择弹窗 */}
                    <SideSheet
                        title={<span style={{ fontSize: '1rem', fontWeight: 600 }}>{friendSheetConfig.title}</span>}
                        visible={friendSheetVisible}
                        onCancel={closeFriendSheet}
                        width="100%"
                        placement="right"
                        bodyStyle={{ padding: '0.625rem' }}
                    >
                        {friendSheetVisible ? <div style={{ position: 'relative' }}>
                            <div
                                ref={friendSheetScrollRef}
                                style={{ maxHeight: 'calc(100vh - 11.25rem)', overflowY: 'auto', paddingBottom: '5.5rem' }}
                            >
                                {renderFriendSheet()}
                            </div>
                            <div className="friend-sheet-floating-buttons">
                                <div className="friend-sheet-floating-button" onClick={() => scrollFriendSheetTo('top')}>
                                    <IconArrowUp size="large" />
                                </div>
                                <div className="friend-sheet-floating-button" onClick={() => scrollFriendSheetTo('bottom')}>
                                    <IconArrowDown size="large" />
                                </div>
                            </div>
                            <div className="sheet-footer" style={{ padding: '1rem', justifyContent: 'space-around', position: 'absolute', bottom: 0, width: '100%', background: 'var(--semi-color-bg-1)' }}>
                                <Button style={{ marginRight: '0.625rem' }} onClick={closeFriendSheet}>取消</Button>
                                <Button theme="solid" disabled={friendSheetLoading} onClick={saveFriendSheet}>保存</Button>
                            </div>
                        </div> : null}
                    </SideSheet>

                    {/* 侧边列表弹窗 */}
                    <SideSheet
                        title={<span style={{ fontSize: '1rem', fontWeight: 600 }}>{sheetConfig.title}</span>}
                        visible={sheetVisible}
                        onCancel={() => setSheetVisible(false)}
                        width="100%"
                        placement="right"
                        bodyStyle={{ padding: '0.625rem' }}
                    >
                        {sheetConfig.desc ? <Text>{sheetConfig.desc}</Text> : null}
                        <div style={{ padding: '0.625rem 1rem', borderBottom: '0.0625rem solid var(--semi-color-border)' }}>
                            <Input
                                prefix={<IconSearch />}
                                placeholder="搜索名称..."
                                value={sheetSearch}
                                onChange={setSheetSearch}
                            />
                            <div style={{ marginTop: '0.625rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <Checkbox onChange={toggleAll} checked={false}>
                                    全选/反选 (当前可见)
                                </Checkbox>
                                <Text size="small" type="secondary">已选: {selectedIds.size}</Text>
                            </div>
                        </div>
                        <div style={{ padding: '0 1rem', overflowY: 'auto', height: 'calc(100vh - 11.25rem)' }}>
                            {renderSheetList()}
                        </div>
                        <div className="sheet-footer" style={{ padding: '1rem', justifyContent: 'space-around', position: 'absolute', bottom: 0, width: '100%', background: 'var(--semi-color-bg-1)' }}>
                            <Button style={{ marginRight: '0.625rem' }} onClick={() => setSheetVisible(false)}>取消</Button>
                            <Button theme="solid" onClick={saveSheet}>保存</Button>
                        </div>
                    </SideSheet>

                    <div className="floating-buttons">
                        <div className="floating-button" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                            <IconArrowUp size="large" />
                        </div>
                        <div className="floating-button" onClick={() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })}>
                            <IconArrowDown size="large" />
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>

</html>
